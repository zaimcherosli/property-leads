<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dapatkan Maklumat Hartanah - Hubungi Kami</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Isi maklumat anda untuk mendapatkan maklumat lanjut mengenai hartanah pilihan anda terus ke WhatsApp anda. Cepat, mudah dan selamat.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Dapatkan Maklumat Hartanah Terkini">
    <meta property="og:description" content="Isi maklumat anda untuk mendapatkan maklumat lanjut mengenai hartanah pilihan anda terus ke WhatsApp anda.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1200&h=630&q=80">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Reset & Variable Tokens */
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #d97706; /* Premium Amber Gold */
            --accent-hover: #b45309;
            --success: #10b981; /* WhatsApp Emerald */
            --success-hover: #059669;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.15);
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --transition-speed: 0.25s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }



        /* Centered Card Container */
        .card-container {
            width: 100%;
            max-width: 460px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-premium);
            position: relative;
            overflow: hidden;
        }

        /* Card Header Logo/Badge */
        .logo-area {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            background: rgba(217, 119, 6, 0.15);
            border: 1px solid rgba(217, 119, 6, 0.3);
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        /* Typography styling */
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-main);
            line-height: 1.25;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        .subheadline {
            font-size: 0.95rem;
            font-weight: 400;
            text-align: center;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            letter-spacing: 0.025em;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            pointer-events: none;
            transition: color var(--transition-speed);
        }

        .form-input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.75rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all var(--transition-speed) ease;
        }

        .form-input:focus {
            border-color: var(--accent);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.15);
        }

        .form-input:focus + .input-icon {
            color: var(--accent);
        }

        /* Custom Validation Feedback */
        .error-feedback {
            font-size: 0.8rem;
            color: var(--danger);
            margin-top: 0.35rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* Buttons and States */
        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--success) 0%, var(--success-hover) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            margin-top: 2rem;
        }

        .btn-submit:hover {
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
        }

        .btn-submit:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        /* Status Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--primary-light);
            border-left: 4px solid var(--danger);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 100;
            width: 90%;
            max-width: 400px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .toast-icon {
            color: var(--danger);
            flex-shrink: 0;
        }

        .toast-message {
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* Trust & Security Badge */
        .trust-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .trust-badge svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Success Card overlay */
        .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-speed) ease;
            z-index: 15;
            border-radius: 24px;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .success-icon {
            width: 72px;
            height: 72px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--success);
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }

        .success-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .success-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .btn-wa-backup {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.9rem 1.5rem;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
            transition: all var(--transition-speed);
        }

        .btn-wa-backup:hover {
            background: var(--success-hover);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-gold {
            0% {
                box-shadow: 0 0 0 0 rgba(217, 119, 6, 0.2);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(217, 119, 6, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(217, 119, 6, 0);
            }
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            .card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Main Centered Card Container -->
    <main class="card-container">
        <div class="card" id="leadCard">
            
            <!-- Success Screen Overlay -->
            <div class="success-overlay" id="successOverlay">
                <div class="success-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h2 class="success-title">Maklumat Dihantar!</h2>
                <p class="success-desc">Terima kasih atas minat anda. Kami sedang menyambungkan anda ke WhatsApp untuk maklumat lanjut...</p>
                <a href="#" id="waBackupBtn" class="btn-wa-backup" target="_blank">
                    <!-- WhatsApp Icon -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.248 8.477 3.517 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.455L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.42 9.864-9.864.002-2.637-1.03-5.116-2.905-6.993C16.257 1.87 13.782.839 11.2.84 5.761.84 1.338 5.263 1.334 10.702c-.001 1.705.452 3.369 1.312 4.811l-.993 3.629 3.72-.976-.01.006zM17.51 14.88c-.3-.15-1.772-.875-2.046-.975-.276-.102-.477-.152-.676.152-.198.3-.77.976-.944 1.176-.173.199-.347.224-.647.074-.3-.15-1.268-.467-2.417-1.493-.893-.797-1.496-1.78-1.672-2.08-.175-.3-.019-.462.13-.611.135-.133.3-.349.45-.523.15-.174.199-.3.3-.499.1-.2.05-.375-.025-.524-.075-.15-.675-1.625-.925-2.225-.244-.589-.492-.51-.676-.519-.174-.008-.373-.01-.572-.01-.2 0-.526.075-.802.374-.276.3-1.05 1.024-1.05 2.5 0 1.475 1.074 2.899 1.224 3.099.15.2 2.115 3.23 5.124 4.532.715.31 1.273.495 1.71.635.72.229 1.375.196 1.893.119.578-.088 1.772-.724 2.02-.1.248-.624.248-1.147.173-1.248-.075-.101-.275-.15-.575-.3z"/>
                    </svg>
                    Hubungi Sekarang
                </a>
            </div>

            <!-- Card Header Logo -->
            <div class="logo-area">
                <div class="logo-icon">
                    <!-- Elegant House/Building SVG Icon -->
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </div>
            </div>

            <h1>Maklumat Hartanah</h1>
            <p class="subheadline" id="subheadline">Isi nama dan nombor telefon.</p>

            <!-- Form -->
            <form id="leadForm" novalidate>
                
                <!-- Nama Penuh Field -->
                <div class="form-group">
                    <label for="nama" class="form-label">Nama Penuh</label>
                    <div class="input-wrapper">
                        <!-- User SVG Icon -->
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input 
                            type="text" 
                            id="nama" 
                            name="nama" 
                            class="form-input" 
                            placeholder="Contoh: Ahmad bin Ali"
                            required
                        >
                    </div>
                    <div class="error-feedback" id="namaError">Sila masukkan nama penuh anda.</div>
                </div>

                <!-- No Telefon Field -->
                <div class="form-group">
                    <label for="telefon" class="form-label">No. Telefon</label>
                    <div class="input-wrapper">
                        <!-- Phone SVG Icon -->
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                        <input 
                            type="tel" 
                            id="telefon" 
                            name="telefon" 
                            class="form-input" 
                            placeholder="Contoh: 0123456789"
                            required
                        >
                    </div>
                    <div class="error-feedback" id="telefonError">Sila masukkan nombor telefon yang sah.</div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="btn-submit">
                    <span class="spinner" id="btnSpinner"></span>
                    <span id="btnText">Lihat Maklumat</span>
                    <!-- Right Arrow SVG Icon -->
                    <svg id="btnArrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>



        </div>
    </main>

    <!-- Error Toast Notification -->
    <div class="toast" id="errorToast">
        <svg class="toast-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span class="toast-message" id="toastMessage">Sila betulkan kesilapan dalam borang.</span>
        <button class="toast-close" id="toastClose">&times;</button>
    </div>

    <!-- JavaScript Execution Layer -->
    <script>
        // ==========================================
        // CONFIGURATION (Sila ubah suai di bawah)
        // ==========================================
        // Masukkan URL Google Apps Script Web App yang telah dideploy
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/xxxxxxxxxxxx/exec';
        
        // Masukkan nombor telefon WhatsApp ejen (guna kod negara tanpa +, cth: 60123456789)
        const WHATSAPP_NUMBER = '60123456789';
        // ==========================================

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('leadForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnSpinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');
            const btnArrow = document.getElementById('btnArrow');
            const successOverlay = document.getElementById('successOverlay');
            const waBackupBtn = document.getElementById('waBackupBtn');
            
            // Error elements
            const errorToast = document.getElementById('errorToast');
            const toastMessage = document.getElementById('toastMessage');
            const toastClose = document.getElementById('toastClose');
            
            // Form inputs
            const inputNama = document.getElementById('nama');
            const inputTelefon = document.getElementById('telefon');
            const errorNama = document.getElementById('namaError');
            const errorTelefon = document.getElementById('telefonError');

            // Extract source from URL parameter
            function getSourceParam() {
                const urlParams = new URLSearchParams(window.location.search);
                // Priority list of query parameters
                const source = urlParams.get('source') || 
                               urlParams.get('utm_source') || 
                               (urlParams.get('fbclid') ? 'facebook_ad' : null) || 
                               (urlParams.get('ttclid') ? 'tiktok_ad' : null) || 
                               'organic';
                return source;
            }

            // Simple phone number normalizer (remove spaces, hyphens, prefixes)
            function normalizePhoneInput(phone) {
                // Remove all non-digits
                let cleaned = phone.replace(/\D/g, '');
                
                // If it starts with 0, convert to 60 (Malaysian country code)
                if (cleaned.startsWith('0')) {
                    cleaned = '6' + cleaned;
                }
                
                // If it doesn't start with 60 and is length 9 or 10 (likely Malaysian local format without country code)
                if (!cleaned.startsWith('60') && (cleaned.length === 9 || cleaned.length === 10)) {
                    cleaned = '60' + cleaned;
                }
                
                return cleaned;
            }

            // Show Toast Alert helper
            function showToast(message) {
                toastMessage.textContent = message;
                errorToast.classList.add('show');
                
                // Auto hide after 5 seconds
                setTimeout(() => {
                    errorToast.classList.remove('show');
                }, 5000);
            }

            // Close toast event handler
            toastClose.addEventListener('click', () => {
                errorToast.classList.remove('show');
            });

            // Input Event Listeners to remove errors on keystroke
            inputNama.addEventListener('input', () => {
                if (inputNama.value.trim() !== '') {
                    inputNama.style.borderColor = '';
                    errorNama.style.display = 'none';
                }
            });

            inputTelefon.addEventListener('input', () => {
                if (inputTelefon.value.trim() !== '') {
                    inputTelefon.style.borderColor = '';
                    errorTelefon.style.display = 'none';
                }
            });

            // Form Submit Event Handler
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const namaVal = inputNama.value.trim();
                const telefonVal = inputTelefon.value.trim();
                let isValid = true;

                // Validate Name
                if (!namaVal) {
                    inputNama.style.borderColor = 'var(--danger)';
                    errorNama.style.display = 'block';
                    isValid = false;
                } else {
                    inputNama.style.borderColor = '';
                    errorNama.style.display = 'none';
                }

                // Validate Phone
                // Clean input for check - should have at least 8 digits
                const cleanedPhone = telefonVal.replace(/\D/g, '');
                if (!telefonVal || cleanedPhone.length < 8) {
                    inputTelefon.style.borderColor = 'var(--danger)';
                    errorTelefon.style.display = 'block';
                    isValid = false;
                } else {
                    inputTelefon.style.borderColor = '';
                    errorTelefon.style.display = 'none';
                }

                if (!isValid) {
                    showToast('Sila lengkapkan borang dengan maklumat yang betul.');
                    return;
                }

                // Activate Loading State
                submitBtn.disabled = true;
                btnSpinner.style.display = 'block';
                btnArrow.style.display = 'none';
                btnText.textContent = 'Menyimpan Maklumat...';

                // Prepare Data Payload
                const timestamp = new Date().toISOString();
                const sourceVal = getSourceParam();
                const normalizedPhone = normalizePhoneInput(telefonVal);
                
                const payload = {
                    timestamp: timestamp,
                    nama: namaVal,
                    telefon: normalizedPhone,
                    source: sourceVal
                };

                // WhatsApp redirection link preparation
                const waTextMessage = `Nama: ${namaVal}\nTelefon: ${telefonVal}\n\nSaya berminat untuk mendapatkan maklumat lanjut.`;
                const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waTextMessage)}`;
                
                // Set backup link for backup button in success overlay
                waBackupBtn.href = waUrl;

                try {
                    // Send to Google Apps Script
                    const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Avoid CORS issues with Apps Script redirect
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    // Note: 'no-cors' mode fetch resolves with type: "opaque", status: 0, and body is empty.
                    // This is expected and normal for Apps Script POST when CORS is not configured.
                    // We assume it succeeded if the fetch did not throw an exception.
                    
                    // Activate Success State UI
                    successOverlay.classList.add('active');
                    
                    // Open WhatsApp automatically
                    setTimeout(() => {
                        window.location.href = waUrl;
                    }, 800);

                } catch (error) {
                    console.error('Submission error:', error);
                    
                    // Deactivate Loading State
                    submitBtn.disabled = false;
                    btnSpinner.style.display = 'none';
                    btnArrow.style.display = 'block';
                    btnText.textContent = 'Lihat Maklumat';
                    
                    // Show error toast with call-to-action
                    showToast('Ralat sambungan. Sila semak sambungan internet atau teruskan ke WhatsApp.');
                    
                    // Show fallback button directly under the form if saving repeatedly fails
                    // to ensure no loss of leads
                    if (!document.getElementById('fallbackWaBtn')) {
                        const fallbackBtn = document.createElement('a');
                        fallbackBtn.id = 'fallbackWaBtn';
                        fallbackBtn.href = waUrl;
                        fallbackBtn.target = '_blank';
                        fallbackBtn.className = 'btn-submit';
                        fallbackBtn.style.background = 'linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%)';
                        fallbackBtn.style.boxShadow = '0 4px 15px rgba(217, 119, 6, 0.3)';
                        fallbackBtn.style.marginTop = '1rem';
                        fallbackBtn.style.textDecoration = 'none';
                        fallbackBtn.innerHTML = `
                            <span>Lihat Maklumat (Tanpa Simpan)</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        `;
                        form.appendChild(fallbackBtn);
                    }
                }
            });
        });
    </script>
</body>
</html>
